function makeIcon(color, big){
  const r=big?12:8, s=`<svg xmlns="http://www.w3.org/2000/svg" width="${r*2+4}" height="${r*2+4}">
    <circle cx="${r+2}" cy="${r+2}" r="${r}" fill="${color}" stroke="#fff" stroke-width="1.8"/></svg>`;
  return L.divIcon({html:s,className:'',iconSize:[r*2+4,r*2+4],iconAnchor:[r+2,r+2],popupAnchor:[0,-(r+5)]});
}

const markerRefs={};
const zoneGroups={};

brgys.forEach(b=>{
  const isPob=b.zone==="Poblacion";
  const m=L.marker([b.lat,b.lng],{icon:makeIcon(b.color,isPob)}).addTo(map)
    .bindPopup(`<div class="popup-num">Barangay · #${b.n} of 49</div>
      <div class="popup-title">${b.name}</div>
      <span class="popup-zone" style="background:${b.zpale};color:${b.color};border:1px solid ${b.color}">${b.zone}</span>`);
  markerRefs[b.n]={marker:m,data:b};
  if(!zoneGroups[b.zone])zoneGroups[b.zone]=[];
  zoneGroups[b.zone].push(b);
});

const zoneOrder=["Poblacion","Northern / Coastal","Central / Inland","Southern","Eastern / Far","Western"];
const listDiv=document.getElementById('brgy-list');
const allLis=[];

zoneOrder.forEach(z=>{
  if(!zoneGroups[z])return;
  const lbl=document.createElement('div');
  lbl.className='zone-label';
  lbl.textContent=`${z} (${zoneGroups[z].length})`;
  lbl.dataset.zone=z;
  listDiv.appendChild(lbl);
  const ul=document.createElement('ul');
  zoneGroups[z].forEach(b=>{
    const li=document.createElement('li');
    li.textContent=`${b.n}. ${b.name}`;
    if(b.zone==="Poblacion")li.classList.add('pob');
    li.dataset.n=b.n;
    li.dataset.name=b.name.toLowerCase();
    li.dataset.zone=b.zone;
    li.addEventListener('click',()=>{
      map.setView([b.lat,b.lng],15,{animate:true});
      markerRefs[b.n].marker.openPopup();
    });
    ul.appendChild(li);
    allLis.push(li);
  });
  listDiv.appendChild(ul);
});

document.getElementById('search-box').addEventListener('input',function(){
  const q=this.value.toLowerCase().trim();
  const zoneHasVisible={};
  allLis.forEach(li=>{
    const show=!q||li.dataset.name.includes(q);
    li.style.display=show?'':'none';
    if(show)zoneHasVisible[li.dataset.zone]=true;
  });
  document.querySelectorAll('.zone-label').forEach(lbl=>{
    lbl.style.display=(!q||zoneHasVisible[lbl.dataset.zone])?'':'none';
  });
});

map.fitBounds(grp.getBounds().pad(0.06));

function haversineKm(a,b){
  const R=6371,dLat=(b.lat-a.lat)*Math.PI/180,dLng=(b.lng-a.lng)*Math.PI/180;
  const v=Math.sin(dLat/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2;
  return (R*2*Math.asin(Math.sqrt(v))).toFixed(2);
}

const drawn=new Set();
const adjLines=[];

Object.entries(ADJ).forEach(([fromName,neighbors])=>{
  const a=byName[fromName];
  if(!a)return;
  neighbors.forEach(toName=>{
    const b=byName[toName];
    if(!b)return;
    const key=[fromName,toName].sort().join('||');
    if(drawn.has(key))return;
    drawn.add(key);
    const km=haversineKm(a,b);
    const line=L.polyline([[a.lat,a.lng],[b.lat,b.lng]],{
      color:'#7ec8e3',weight:1.8,opacity:0.55,dashArray:'5 6'
    });
    line.bindTooltip(`<b>${fromName}</b> ↔ <b>${toName}</b><br>~${km} km (straight-line)`,{
      sticky:true,className:'adj-tip',direction:'top'
    });
    line.addTo(map);
    adjLines.push(line);
  });
});

// Toggle control
const LinesToggle=L.Control.extend({
  onAdd:function(){
    const btn=L.DomUtil.create('button');
    btn.innerHTML='🔗 Lines: ON';
    btn.style.cssText='background:#0d2137;color:#7ec8e3;border:1px solid #2e6da4;padding:5px 11px;border-radius:6px;cursor:pointer;font-size:0.72rem;font-weight:700;letter-spacing:0.5px;margin-top:4px;display:block';
    let on=true;
    L.DomEvent.on(btn,'click',function(e){
      L.DomEvent.stopPropagation(e);
      on=!on;
      adjLines.forEach(l=>on?l.addTo(map):map.removeLayer(l));
      btn.innerHTML=`🔗 Lines: ${on?'ON':'OFF'}`;
      btn.style.color=on?'#7ec8e3':'#4a6a7a';
      btn.style.borderColor=on?'#2e6da4':'#1a3a4a';
    });
    return btn;
  }
});
new LinesToggle({position:'topleft'}).addTo(map);
</script>

.adj-tip::before,.adj-tip::after{display:none!important}
</style>
