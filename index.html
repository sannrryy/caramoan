<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPX Express - Caramoan Barangay Map</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Leaflet Map CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --spx-orange: #ff5722;
            --spx-orange-hover: #e64a19;
            --spx-orange-light: #ffebe5;
            --spx-blue: #002f6c;
            --spx-blue-dark: #001f4d;

            /* Light Theme Variables */
            --bg-primary: #f4f6f9;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --border-color: #e2e8f0;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(226, 232, 240, 0.8);
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);

            /* Status Colors */
            --status-normal: #10b981;
            --status-normal-bg: #ecfdf5;
            --status-delayed: #f59e0b;
            --status-delayed-bg: #fffbeb;
            --status-suspended: #ef4444;
            --status-suspended-bg: #fef2f2;
            --status-completed: #3b82f6;
            --status-completed-bg: #eff6ff;

            /* Map styles */
            --map-invert: 0;
            --map-hue: 0deg;
            --map-sat: 100%;
            --map-bright: 100%;
        }

        [data-theme="dark"] {
            --bg-primary: #0b0f19;
            --bg-secondary: #111827;
            --bg-card: #1f2937;
            --border-color: #374151;
            --text-primary: #f9fafb;
            --text-secondary: #d1d5db;
            --text-muted: #6b7280;
            --glass-bg: rgba(17, 24, 39, 0.8);
            --glass-border: rgba(55, 65, 81, 0.8);
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.5);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.5), 0 2px 4px -2px rgba(0, 0, 0, 0.5);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.5), 0 4px 6px -4px rgba(0, 0, 0, 0.5);

            --status-normal-bg: rgba(16, 185, 129, 0.1);
            --status-delayed-bg: rgba(245, 158, 11, 0.1);
            --status-suspended-bg: rgba(239, 68, 68, 0.1);
            --status-completed-bg: rgba(59, 130, 246, 0.1);

            /* Custom Dark Tiles filter values */
            --map-invert: 1;
            --map-hue: 180deg;
            --map-sat: 80%;
            --map-bright: 90%;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', 'Outfit', sans-serif;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Layout Structure */
        .app-container {
            display: flex;
            width: 100%;
            height: 100vh;
            position: relative;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 420px;
            background-color: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            height: 100%;
            z-index: 10;
            box-shadow: var(--shadow-lg);
            flex-shrink: 0;
        }

        /* Header */
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .brand-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-icon {
            background-color: var(--spx-orange);
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            font-weight: 800;
            font-size: 1.2rem;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 10px rgba(255, 87, 34, 0.3);
        }

        .brand-text {
            display: flex;
            flex-direction: column;
        }

        .brand-title {
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--spx-blue);
            letter-spacing: -0.5px;
            line-height: 1;
        }

        [data-theme="dark"] .brand-title {
            color: white;
        }

        .brand-subtitle {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        .theme-toggle {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            cursor: pointer;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        .theme-toggle:hover {
            background-color: var(--border-color);
            transform: scale(1.05);
        }

        /* Search and Filter Panel */
        .search-wrapper {
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 12px 16px 12px 42px;
            border-radius: 10px;
            border: 1.5px solid var(--border-color);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-size: 0.9rem;
            font-weight: 500;
            outline: none;
            transition: all 0.2s ease;
        }

        .search-input:focus {
            border-color: var(--spx-orange);
            box-shadow: 0 0 0 3px var(--spx-orange-light);
            background-color: var(--bg-secondary);
        }

        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }

        .filter-container {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 5px;
            scrollbar-width: none;
        }

        .filter-container::-webkit-scrollbar {
            display: none;
        }

        .filter-chip {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            border: 1.5px solid var(--border-color);
            background-color: var(--bg-secondary);
            color: var(--text-secondary);
            white-space: nowrap;
            transition: all 0.2s ease;
        }

        .filter-chip.active {
            background-color: var(--spx-orange);
            color: white;
            border-color: var(--spx-orange);
            box-shadow: 0 3px 8px rgba(255, 87, 34, 0.25);
        }

        .filter-chip:hover:not(.active) {
            background-color: var(--bg-primary);
            border-color: var(--text-muted);
        }

        /* Stats Section */
        .stats-section {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            background-color: var(--bg-primary);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .stat-card {
            background-color: var(--bg-secondary);
            padding: 12px 10px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
        }

        .stat-val {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--text-primary);
        }

        .stat-lbl {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }

        /* Barangay List */
        .barangay-list-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .barangay-item {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 12px 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
        }

        .barangay-item:hover {
            border-color: var(--spx-orange);
            transform: translateX(2px);
            background-color: var(--spx-orange-light);
        }

        [data-theme="dark"] .barangay-item:hover {
            background-color: rgba(255, 87, 34, 0.1);
        }

        .barangay-item.active-selected {
            border-color: var(--spx-blue);
            background-color: var(--spx-orange-light);
            box-shadow: 0 0 0 2px rgba(255, 87, 34, 0.2);
        }

        [data-theme="dark"] .barangay-item.active-selected {
            border-color: var(--spx-orange);
            background-color: rgba(255, 87, 34, 0.15);
        }

        .item-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .item-number {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            min-width: 20px;
        }

        .item-status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .item-name {
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--text-primary);
        }

        .item-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .item-type-badge {
            font-size: 0.65rem;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .item-type-badge.mainland {
            background-color: #f1f5f9;
            color: #475569;
            border: 1px solid #cbd5e1;
        }

        [data-theme="dark"] .item-type-badge.mainland {
            background-color: #1e293b;
            color: #94a3b8;
            border: 1px solid #334155;
        }

        .item-type-badge.island {
            background-color: #eff6ff;
            color: #2563eb;
            border: 1px solid #bfdbfe;
        }

        [data-theme="dark"] .item-type-badge.island {
            background-color: rgba(37, 99, 235, 0.15);
            color: #60a5fa;
            border: 1px solid rgba(96, 165, 250, 0.3);
        }

        /* Location Status Badges */
        .location-status-badge {
            font-size: 0.6rem;
            font-weight: 700;
            padding: 1px 4px;
            border-radius: 3px;
            text-transform: uppercase;
            border: 1px solid transparent;
            display: inline-block;
        }
        .location-status-badge.proper {
            background-color: #ecfdf5;
            color: #10b981;
            border-color: #a7f3d0;
        }
        [data-theme="dark"] .location-status-badge.proper {
            background-color: rgba(16, 185, 129, 0.15);
            color: #34d399;
            border-color: rgba(52, 211, 153, 0.3);
        }
        .location-status-badge.mountain {
            background-color: #fef3c7;
            color: #d97706;
            border-color: #fde68a;
        }
        [data-theme="dark"] .location-status-badge.mountain {
            background-color: rgba(217, 119, 6, 0.15);
            color: #fbbf24;
            border-color: rgba(251, 191, 36, 0.3);
        }
        .location-status-badge.island {
            background-color: #eff6ff;
            color: #2563eb;
            border-color: #bfdbfe;
        }
        [data-theme="dark"] .location-status-badge.island {
            background-color: rgba(37, 99, 235, 0.15);
            color: #60a5fa;
            border-color: rgba(96, 165, 250, 0.3);
        }

        .item-parcels-badge {
            font-size: 0.7rem;
            font-weight: 700;
            background-color: var(--spx-orange-light);
            color: var(--spx-orange);
            padding: 2px 6px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        [data-theme="dark"] .item-parcels-badge {
            background-color: rgba(255, 87, 34, 0.15);
        }

        /* Action Footer */
        .sidebar-footer {
            padding: 15px 20px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
            background-color: var(--bg-secondary);
        }

        .btn {
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            border: 1px solid var(--border-color);
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            flex-grow: 1;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background-color: var(--bg-primary);
            border-color: var(--text-secondary);
        }

        .btn-primary {
            background-color: var(--spx-orange);
            color: white;
            border-color: var(--spx-orange);
            box-shadow: 0 4px 10px rgba(255, 87, 34, 0.2);
        }

        .btn-primary:hover {
            background-color: var(--spx-orange-hover);
            border-color: var(--spx-orange-hover);
            transform: translateY(-1px);
        }

        /* Map Container */
        .map-container {
            flex-grow: 1;
            height: 100%;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Leaflet Dark Mode Tiles filter */
        [data-theme="dark"] .leaflet-tile-container {
            filter: invert(var(--map-invert)) hue-rotate(var(--map-hue)) saturate(var(--map-sat)) brightness(var(--map-bright));
        }

        /* Floating Controls on Map */
        .map-overlay-controls {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .map-btn {
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            width: 44px;
            height: 44px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.1rem;
            box-shadow: var(--shadow-md);
            transition: all 0.2s ease;
        }

        .map-btn:hover {
            transform: scale(1.05);
            background-color: var(--bg-primary);
            color: var(--spx-orange);
        }

        .map-btn.active {
            background-color: var(--spx-orange) !important;
            color: white !important;
            border-color: var(--spx-orange) !important;
        }

        .line-tooltip {
            background-color: var(--bg-secondary) !important;
            color: var(--text-primary) !important;
            border: 1px solid var(--border-color) !important;
            font-family: 'Outfit', sans-serif !important;
            font-size: 0.75rem !important;
            font-weight: 600 !important;
            border-radius: 6px !important;
            box-shadow: var(--shadow-sm) !important;
            padding: 4px 8px !important;
            opacity: 0.95 !important;
        }

        /* Proximity Connections List Items */
        .proximity-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 14px;
            margin-bottom: 8px;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .proximity-item:hover {
            border-color: var(--spx-orange);
            background-color: var(--bg-primary);
            transform: translateX(2px);
        }

        .proximity-item.active-selected {
            border-color: var(--spx-orange);
            background-color: var(--spx-orange-light);
            box-shadow: var(--shadow-sm);
        }

        .proximity-names {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .proximity-names i {
            color: var(--text-muted);
            font-size: 0.75rem;
        }

        .proximity-details {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-weight: 600;
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .fallback-tag {
            background-color: rgba(255, 87, 34, 0.1);
            color: var(--spx-orange);
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 0.6rem;
            text-transform: uppercase;
            font-weight: 700;
        }

        .proximity-distance {
            font-size: 0.85rem;
            font-weight: 800;
            color: var(--spx-orange);
            background-color: var(--spx-orange-light);
            padding: 4px 8px;
            border-radius: 6px;
        }

        /* Marker Styling */
        .custom-div-icon {
            background: none;
            border: none;
        }

        .marker-pin {
            width: 32px;
            height: 32px;
            border-radius: 50% 50% 50% 0;
            position: absolute;
            transform: rotate(-45deg);
            left: 50%;
            top: 50%;
            margin: -16px 0 0 -16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            border: 2px solid white;
            transition: all 0.3s ease;
        }

        .marker-pin::after {
            content: '';
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: white;
            position: absolute;
        }

        .marker-pin.active-highlight {
            transform: rotate(-45deg) scale(1.25) !important;
            box-shadow: 0 0 15px var(--spx-orange);
            border-color: var(--spx-blue) !important;
        }

        .marker-label {
            position: absolute;
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 0.7rem;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            white-space: nowrap;
            bottom: -22px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: var(--shadow-sm);
            pointer-events: none;
        }



        /* Popup Custom Styling */
        .leaflet-popup-content-wrapper {
            background-color: var(--bg-secondary) !important;
            color: var(--text-primary) !important;
            border-radius: 12px !important;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-lg) !important;
            padding: 0 !important;
            overflow: hidden;
        }

        .leaflet-popup-content {
            margin: 0 !important;
            width: 280px !important;
        }

        .popup-header {
            background-color: var(--spx-blue);
            color: white;
            padding: 12px 15px;
            font-weight: 700;
            font-size: 0.95rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        [data-theme="dark"] .popup-header {
            background-color: #1f2937;
            border-bottom: 1px solid var(--border-color);
        }

        .popup-body {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            font-size: 0.8rem;
        }

        .popup-row {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 6px;
        }

        .popup-row:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .popup-lbl {
            font-weight: 600;
            color: var(--text-secondary);
        }

        .popup-val {
            font-weight: 700;
            color: var(--text-primary);
        }

        .popup-notes {
            background-color: var(--bg-primary);
            padding: 8px;
            border-radius: 6px;
            font-style: italic;
            color: var(--text-secondary);
            margin-top: 4px;
            max-height: 60px;
            overflow-y: auto;
        }

        .popup-actions {
            display: flex;
            gap: 8px;
            padding: 0 15px 15px 15px;
        }

        .popup-btn {
            flex-grow: 1;
            padding: 6px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            border: 1px solid var(--spx-orange);
            background-color: white;
            color: var(--spx-orange);
            text-align: center;
            transition: all 0.2s ease;
        }

        [data-theme="dark"] .popup-btn {
            background-color: var(--bg-card);
        }

        .popup-btn.primary {
            background-color: var(--spx-orange);
            color: white;
        }

        .popup-btn:hover {
            transform: translateY(-1px);
            opacity: 0.9;
        }

        .leaflet-popup-tip {
            background: var(--bg-secondary) !important;
            border: 1px solid var(--border-color);
        }

        /* Legend panel */
        .map-legend {
            background-color: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 12px 15px;
            border-radius: 12px;
            bottom: 20px;
            right: 20px;
            position: absolute;
            z-index: 1000;
            box-shadow: var(--shadow-lg);
            backdrop-filter: blur(8px);
            font-size: 0.75rem;
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 180px;
        }

        .legend-title {
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
            color: var(--text-primary);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            border: 1.5px solid white;

            // Create map
            map = L.map('map', {
                zoomControl: false // Disable standard zoom control to let us place ours or styling

            // Add zoom control at bottom-right
            L.control.zoom({
                position: 'bottomleft'
            }).addTo(map);

            // Add standard tile layer (CartoDB Voyager or Dark Matter depending on theme)
            updateMapTiles();
        }

        // Update map tiles based on theme
        let currentTileLayer;
        function updateMapTiles() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';

            if (currentTileLayer) {
                map.removeLayer(currentTileLayer);
            }

            const tileUrl = isDark
                ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
                : 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png';

            const attribution = '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>';

            currentTileLayer = L.tileLayer(tileUrl, {
                attribution: attribution,
                maxZoom: 20
            }).addTo(map);
        }

            markers.forEach(m => map.removeLayer(m));

                        <div class="marker-pin" style="background-color: ${color};" id="marker-pin-${index}"></div>
                        <div class="marker-label">${brgy.name}</div>
                    </div>
                `;

                const customIcon = L.divIcon({
                    html: iconHtml,
                    className: 'custom-div-icon',
                    iconSize: [30, 42],
                    iconAnchor: [15, 42],
                    popupAnchor: [0, -36]
                });

                // Create Leaflet Marker
                const marker = L.marker([brgy.lat, brgy.lon], { icon: customIcon }).addTo(map);

                // Store index in marker object for click handlers
                marker.brgyIndex = index;

                // Bind Popup
                const popupContent = createPopupContent(brgy, index);
                marker.bindPopup(popupContent);

                // Event handlers
                marker.on('click', function () {
                    selectBarangayInList(index, false);
                });

                markers.push(marker);
            });
        }

                    ${hasAdo ? `
                    <div style="background-color: var(--bg-primary); border-radius: 8px; padding: 8px; margin-top: 4px; border: 1px solid var(--border-color);">
                        <div style="font-weight: 700; font-size: 0.7rem; color: var(--text-secondary); margin-bottom: 6px; border-bottom: 1px solid var(--border-color); padding-bottom: 4px; display: flex; justify-content: space-between;">
                            <span>Average Daily Orders (ADO)</span>
                            <span style="color: #10b981; font-weight: 800;">+${growth}%</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; font-size: 0.75rem;">
                            <div>
                                <div style="font-size: 0.6rem; color: var(--text-muted); font-weight: 600;">EOY 2026</div>
                                <div style="font-weight: 700; color: var(--text-primary);">${brgy.ado_2026.toFixed(2)}</div>
                            </div>
                            <div style="text-align: right;">
                                <div style="font-size: 0.6rem; color: var(--text-muted); font-weight: 600;">EOY 2027</div>
                                <div style="font-weight: 700; color: var(--text-primary);">${brgy.ado_2027.toFixed(2)}</div>
                            </div>
                        </div>
                    </div>
                    ` : `
                    <div style="background-color: var(--bg-primary); border-radius: 8px; padding: 8px; margin-top: 4px; text-align: center; color: var(--text-muted); font-style: italic;">
                        No ADO projections available.
                    </div>
                    `}
                    <div class="popup-row" style="margin-top: 4px; font-size: 0.7rem; color: var(--text-muted); border-top: 1px dashed var(--border-color); padding-top: 4px;">
                        <span>Coordinates:</span>
                        <span>${brgy.lat.toFixed(4)}, ${brgy.lon.toFixed(4)}</span>
                    </div>
                </div>
            `;
        }

        // Calculate distance between coordinates using Haversine formula
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; // Earth's radius in km
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        // Get proximity pairs with threshold and isolated-nodes fallback connections
        function getProximityPairs(listToUse) {
            const threshold = 2.5; // km
            const pairs = [];
            const connectedSet = new Set();

            // First: find standard proximity connections within 2.5 km
            for (let i = 0; i < listToUse.length; i++) {
                for (let j = i + 1; j < listToUse.length; j++) {
                    const b1 = listToUse[i];
                    const b2 = listToUse[j];
                    const dist = getDistance(b1.lat, b1.lon, b2.lat, b2.lon);
                    if (dist <= threshold) {
                        pairs.push({
                            b1: b1,
                            b2: b2,
                            distance: dist,
                            isFallback: false
                        });
                        connectedSet.add(b1.originalIndex);
                        connectedSet.add(b2.originalIndex);
                    }
                }
            }

            // Explicitly connect Gibgos and Mampirao
            const gibgos = listToUse.find(b => b.name === "Gibgos");
            const mampirao = listToUse.find(b => b.name === "Mampirao");
            if (gibgos && mampirao) {
                const alreadyConnected = pairs.some(p =>
                    (p.b1.originalIndex === gibgos.originalIndex && p.b2.originalIndex === mampirao.originalIndex) ||
                    (p.b1.originalIndex === mampirao.originalIndex && p.b2.originalIndex === gibgos.originalIndex)
                );
                if (!alreadyConnected) {
                    const dist = getDistance(gibgos.lat, gibgos.lon, mampirao.lat, mampirao.lon);
                    pairs.push({
                        b1: gibgos,
                        b2: mampirao,
                        distance: dist,
                        isFallback: false
                    });
                    connectedSet.add(gibgos.originalIndex);
                    connectedSet.add(mampirao.originalIndex);
                }
            }

            // Second: find isolated barangays and connect them to their single nearest neighbor
            for (let i = 0; i < listToUse.length; i++) {
                const b1 = listToUse[i];
                if (!connectedSet.has(b1.originalIndex)) {
                    let minDistance = Infinity;
                    let nearestNeighbor = null;

                    for (let j = 0; j < listToUse.length; j++) {
                        if (i === j) continue;
                        const b2 = listToUse[j];
                        const dist = getDistance(b1.lat, b1.lon, b2.lat, b2.lon);
                        if (dist < minDistance) {
                            minDistance = dist;
                            nearestNeighbor = b2;
                        }
                    }

                    if (nearestNeighbor) {
                        // Avoid duplicates
                        const pairExists = pairs.some(p =>
                            (p.b1.originalIndex === b1.originalIndex && p.b2.originalIndex === nearestNeighbor.originalIndex) ||
                            (p.b1.originalIndex === nearestNeighbor.originalIndex && p.b2.originalIndex === b1.originalIndex)
                        );

                        if (!pairExists) {
                            pairs.push({
                                b1: b1,
                                b2: nearestNeighbor,
                                distance: minDistance,
                                isFallback: true
                            });
                        }
                        connectedSet.add(b1.originalIndex);
                        connectedSet.add(nearestNeighbor.originalIndex);
                    }
                }
            }

            // Sort pairs by distance (shortest first)
            pairs.sort((a, b) => a.distance - b.distance);
            return pairs;
        }

        // Draw connections between nearby barangays for clustering
        function renderClusterLines(filteredBrgy) {
            // Remove previous lines
            clusterLines.forEach(line => map.removeLayer(line));
            clusterLines = [];

            if (!showClusterLines) return;

            // Get computed connections (includes nearest neighbor fallbacks)
            const connections = getProximityPairs(filteredBrgy);

            connections.forEach(pair => {
                const b1 = pair.b1;
                const b2 = pair.b2;
                const dist = pair.distance;
                const isFallback = pair.isFallback;

                const line = L.polyline([[b1.lat, b1.lon], [b2.lat, b2.lon]], {
                    color: 'var(--spx-orange)',
                    weight: isFallback ? 1.5 : 2.5,
                    opacity: isFallback ? 0.35 : 0.55,
                    dashArray: isFallback ? '3, 6' : '5, 5',
                    className: 'cluster-line'
                }).addTo(map);

                // Attach sticky tooltip showing distance on hover
                const fallbackLabel = isFallback ? ' <span style="color: var(--spx-orange); font-weight:700;">(Nearest connection)</span>' : '';
                line.bindTooltip(`<strong>${b1.name} — ${b2.name}</strong>${fallbackLabel}<br>Distance: ${dist.toFixed(2)} km`, {
                    sticky: true,
                    className: 'line-tooltip'
                });

                clusterLines.push(line);
            });
        }

        // Update list dashboard & stats
        function updateUI() {
            // Filter barangays
            let filteredBrgy = barangays.map((b, i) => ({ ...b, originalIndex: i }));

            // Apply search query
            if (searchQuery.trim() !== '') {
                const query = searchQuery.toLowerCase().trim();
                filteredBrgy = filteredBrgy.filter(b => b.name.toLowerCase().includes(query));
            }

            // Sort alphabetically by name
            filteredBrgy.sort((a, b) => a.name.localeCompare(b.name));

            // Sync map visibility (show only filtered pins)
            syncMapMarkersVisibility(filteredBrgy);

            // Draw proximity lines for clustering
            renderClusterLines(filteredBrgy);

            const statsGrid = document.getElementById('statsGrid');
            const statCardAdo2026 = document.getElementById('statCardAdo2026');
            const statCardAdo2027 = document.getElementById('statCardAdo2027');

            if (activeTab === 'barangays') {
                // Show Barangay list container, Hide Proximity container
                barangayListEl.style.display = 'block';
                proximityListEl.style.display = 'none';

                // Update Stats Grid Columns & display ADO cards
                if (statsGrid) statsGrid.style.gridTemplateColumns = 'repeat(3, 1fr)';
                if (statCardAdo2026) statCardAdo2026.style.display = 'block';
                if (statCardAdo2027) statCardAdo2027.style.display = 'block';

                statTotalBrgy.innerText = filteredBrgy.length;
                statTotalBrgy.style.fontSize = '1.2rem';
                statLabelText.innerText = 'ACTIVE BRGYS';

                // Calculate total ADO values
                const totalAdo2026 = filteredBrgy.reduce((sum, b) => sum + (b.ado_2026 || 0), 0);
                const totalAdo2027 = filteredBrgy.reduce((sum, b) => sum + (b.ado_2027 || 0), 0);

                const statAdo2026El = document.getElementById('statAdo2026');
                const statAdo2027El = document.getElementById('statAdo2027');
                if (statAdo2026El) statAdo2026El.innerText = totalAdo2026.toFixed(1);
                if (statAdo2027El) statAdo2027El.innerText = totalAdo2027.toFixed(1);

                // Render Barangay List
                barangayListEl.innerHTML = '';

                if (filteredBrgy.length === 0) {
                    barangayListEl.innerHTML = `
                        <div style="text-align: center; padding: 40px 10px; color: var(--text-muted);">
                            <i class="fa-solid fa-magnifying-glass" style="font-size: 2.5rem; margin-bottom: 15px; display: block; opacity: 0.5;"></i>
                            <span style="font-weight: 600;">Walang nahanap na barangay.</span>
                            <p style="font-size: 0.8rem; margin-top: 5px;">Subukan mong baguhin ang search text.</p>
                        </div>
                    `;
                    return;
                }

                filteredBrgy.forEach((brgy, idx) => {
                    const isSelected = selectedBrgyIndex === brgy.originalIndex;

                    // Format index as two digit string
                    const displayNum = String(idx + 1).padStart(2, '0');

                    const item = document.createElement('div');
                    item.className = `barangay-item ${isSelected ? 'active-selected' : ''}`;
                    item.setAttribute('data-index', brgy.originalIndex);

                    const locationBadge = brgy.location_status 
                        ? `<span class="location-status-badge ${brgy.location_status.toLowerCase()}">${brgy.location_status}</span>`
                        : '';

                    const adoDisplay = (brgy.ado_2026 !== undefined && brgy.ado_2026 !== null)
                        ? `ADO: <strong>${brgy.ado_2026.toFixed(1)}</strong> ('26) → <strong>${brgy.ado_2027.toFixed(1)}</strong> ('27)`
                        : 'No ADO Projections';

                    item.innerHTML = `
                        <div class="item-left" style="gap: 12px; align-items: flex-start; max-width: 75%;">
                            <span class="item-number" style="margin-top: 2px;">${displayNum}</span>
                            <div style="display: flex; flex-direction: column; gap: 3px;">
                                <div style="display: flex; align-items: center; gap: 6px;">
                                    <i class="fa-solid fa-location-dot" style="color: var(--spx-orange); font-size: 0.8rem;" title="Barangay Pin"></i>
                                    <span class="item-name">${brgy.name}</span>
                                </div>
                                <span class="item-ado" style="font-size: 0.7rem; color: var(--text-muted); font-weight: 500;">
                                    ${adoDisplay}
                                </span>
                            </div>
                        </div>
                        <div class="item-right" style="flex-direction: column; align-items: flex-end; gap: 5px;">
                            <span class="item-type-badge ${brgy.type.toLowerCase()}">${brgy.type}</span>
                            ${locationBadge}
                        </div>
                    `;

                    // Add click handler to select and fly to
                    item.addEventListener('click', () => {
                        selectBarangayInList(brgy.originalIndex, true);
                    });

                    barangayListEl.appendChild(item);
                });
            } else {
                // Show Proximity container, Hide Barangay container
                barangayListEl.style.display = 'none';
                proximityListEl.style.display = 'block';

                // Update Stats Grid Columns & hide ADO cards
                if (statsGrid) statsGrid.style.gridTemplateColumns = '1fr';
                if (statCardAdo2026) statCardAdo2026.style.display = 'none';
                if (statCardAdo2027) statCardAdo2027.style.display = 'none';

                // Get proximity connections list
                const connections = getProximityPairs(filteredBrgy);

                // Update Stats
                statTotalBrgy.innerText = connections.length;
                statTotalBrgy.style.fontSize = '1.8rem';
                statLabelText.innerText = 'TOTAL PROXIMITY CONNECTIONS';

                // Render Proximity connections List
                proximityListEl.innerHTML = '';

                if (connections.length === 0) {
                    proximityListEl.innerHTML = `
                        <div style="text-align: center; padding: 40px 10px; color: var(--text-muted);">
                            <i class="fa-solid fa-circle-nodes" style="font-size: 2.5rem; margin-bottom: 15px; display: block; opacity: 0.5;"></i>
                            <span style="font-weight: 600;">Walang nahanap na koneksyon.</span>
                            <p style="font-size: 0.8rem; margin-top: 5px;">Walang barangay na magkakalapit sa kasalukuyang listahan.</p>
                        </div>
                    `;
                    return;
                }

                connections.forEach((pair, idx) => {
                    const item = document.createElement('div');
                    item.className = 'proximity-item';
                    item.setAttribute('data-pair-idx', idx);

                    const fallbackTag = pair.isFallback ? '<span class="fallback-tag">Nearest</span>' : '';

                    item.innerHTML = `
                        <div class="proximity-left">
                            <span class="proximity-names">${pair.b1.name} <i class="fa-solid fa-arrows-left-right"></i> ${pair.b2.name}</span>
                            <span class="proximity-details">${pair.b1.type} — ${pair.b2.type} ${fallbackTag}</span>
                        </div>
                        <div class="proximity-right">
                            <span class="proximity-distance">${pair.distance.toFixed(2)} km</span>
                        </div>
                    `;

                    item.addEventListener('click', () => {
                        selectProximityPair(idx, pair);
                    });

                    proximityListEl.appendChild(item);
                });
            }
        }

        // Show/hide map markers based on current active list filter
        function syncMapMarkersVisibility(filteredBrgy) {
            const activeOriginalIndices = new Set(filteredBrgy.map(b => b.originalIndex));

            markers.forEach((marker, index) => {
                if (activeOriginalIndices.has(index)) {
                    if (!map.hasLayer(marker)) {
                        marker.addTo(map);
                    }
                } else {
                    if (map.hasLayer(marker)) {
                        map.removeLayer(marker);
                    }
                }
            });
        }

        // Select a barangay, focus on map, open popup
        function selectBarangayInList(index, flyToMap = true) {
            // Update selected class
            const previousSelected = document.querySelector('.barangay-item.active-selected');
            if (previousSelected) {
                previousSelected.classList.remove('active-selected');
            }

            selectedBrgyIndex = index;
            const selectedCard = document.querySelector(`.barangay-item[data-index="${index}"]`);
            if (selectedCard) {
                selectedCard.classList.add('active-selected');
                selectedCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }

            // Reset any active proximity list selection
            const activeProx = document.querySelector('.proximity-item.active-selected');
            if (activeProx) activeProx.classList.remove('active-selected');

            // Reset proximity line styles
            clusterLines.forEach(line => {
                line.setStyle({
                    color: 'var(--spx-orange)',
                    weight: line.isFallback ? 1.5 : 2.5,
                    opacity: line.isFallback ? 0.35 : 0.55
                });
            });

            // Focus on marker and open popup
            const marker = markers[index];
            if (marker) {
                if (flyToMap) {
                    map.flyTo([barangays[index].lat, barangays[index].lon], 14, {
                        animate: true,
                        duration: 1.2
                    });
                }

                // Delay opening popup slightly to allow flying animation to finish
                setTimeout(() => {
                    marker.openPopup();

                    // Highlight pin on map
                    const pins = document.querySelectorAll('.marker-pin');
                    pins.forEach(pin => pin.classList.remove('active-highlight'));

                    const activePin = document.getElementById(`marker-pin-${index}`);
                    if (activePin) {
                        activePin.classList.add('active-highlight');
                    }
                }, flyToMap ? 1200 : 50);
            }
        }

        // Select and highlight a proximity pair on map
        function selectProximityPair(idx, pair) {
            // Remove previous selected class
            const previousSelected = document.querySelector('.proximity-item.active-selected');
            if (previousSelected) {
                previousSelected.classList.remove('active-selected');
            }
            const selectedCard = document.querySelector(`.proximity-item[data-pair-idx="${idx}"]`);
            if (selectedCard) {
                selectedCard.classList.add('active-selected');
            }

            // Reset any active barangay list selection
            const activeBrgy = document.querySelector('.barangay-item.active-selected');
            if (activeBrgy) activeBrgy.classList.remove('active-selected');
            selectedBrgyIndex = null;

            // Fly to midpoint
            const midLat = (pair.b1.lat + pair.b2.lat) / 2;
            const midLon = (pair.b1.lon + pair.b2.lon) / 2;
            map.flyTo([midLat, midLon], 14, {
                animate: true,
                duration: 1.2
            });

            // Highlight the specific polyline on the map
            clusterLines.forEach(line => {
                const latlngs = line.getLatLngs();
                const isMatch = (
                    (latlngs[0].lat === pair.b1.lat && latlngs[0].lng === pair.b1.lon && latlngs[1].lat === pair.b2.lat && latlngs[1].lng === pair.b2.lon) ||
                    (latlngs[0].lat === pair.b2.lat && latlngs[0].lng === pair.b2.lon && latlngs[1].lat === pair.b1.lat && latlngs[1].lng === pair.b1.lon)
                );

                if (isMatch) {
                    line.setStyle({
                        color: '#ff3d00', // Highlight color: Red-Orange
                        weight: 4,
                        opacity: 0.95
                    });
                    line.openTooltip();
                } else {
                    // Reset to standard style
                    line.setStyle({
                        color: 'var(--spx-orange)',
                        weight: line.isFallback ? 1.5 : 2.5,
                        opacity: line.isFallback ? 0.35 : 0.55
                    });
                }
            });
        }



        // Setup All Event Listeners
        function setupEventListeners() {
            // Search Input
            searchInput.addEventListener('input', (e) => {
                searchQuery = e.target.value;
                updateUI();
            });


            // Theme toggle
            themeToggleBtn.addEventListener('click', () => {
                const currentTheme = document.documentElement.getAttribute('data-theme');
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark';

                document.documentElement.setAttribute('data-theme', newTheme);
                themeToggleBtn.innerHTML = newTheme === 'dark'
                    ? '<i class="fa-solid fa-sun"></i>'
                    : '<i class="fa-solid fa-moon"></i>';

                // Update Leaflet tile source
                updateMapTiles();
                // Redraw markers to keep consistency in text sizes etc
                renderMarkers();
            });

            // Recenter Button
            btnRecenter.addEventListener('click', () => {
                map.flyTo(CARAMOAN_CENTER, DEFAULT_ZOOM, {
                    animate: true,
                    duration: 1.5
                });

                // Remove highlights
                const pins = document.querySelectorAll('.marker-pin');
                pins.forEach(pin => pin.classList.remove('active-highlight'));
                selectedBrgyIndex = null;
                updateUI();
            });

            // Toggle Proximity Lines Button
            const btnToggleClusters = document.getElementById('btnToggleClusters');
            if (showClusterLines) {
                btnToggleClusters.classList.add('active');
            }
            btnToggleClusters.addEventListener('click', () => {
                showClusterLines = !showClusterLines;
                if (showClusterLines) {
                    btnToggleClusters.classList.add('active');
                } else {
                    btnToggleClusters.classList.remove('active');
                }
                updateUI();
            });

            // Tab Switching Listeners
            tabBrgyList.addEventListener('click', () => {
                activeTab = 'barangays';

                // Style Tab 1 Active
                tabBrgyList.style.color = 'var(--spx-orange)';
                tabBrgyList.style.fontWeight = '700';
                tabBrgyList.style.borderBottomColor = 'var(--spx-orange)';

                // Style Tab 2 Inactive
                tabProximityList.style.color = 'var(--text-muted)';
                tabProximityList.style.fontWeight = '600';
                tabProximityList.style.borderBottomColor = 'transparent';

                // Reset search query
                searchInput.value = '';
                searchQuery = '';
                searchInput.placeholder = 'Search Barangay (e.g. Tawog)...';

                updateUI();
            });

            tabProximityList.addEventListener('click', () => {
                activeTab = 'proximity';

                // Style Tab 2 Active
                tabProximityList.style.color = 'var(--spx-orange)';
                tabProximityList.style.fontWeight = '700';
                tabProximityList.style.borderBottomColor = 'var(--spx-orange)';

                // Style Tab 1 Inactive
                tabBrgyList.style.color = 'var(--text-muted)';
                tabBrgyList.style.fontWeight = '600';
                tabBrgyList.style.borderBottomColor = 'transparent';

                // Reset search query
                searchInput.value = '';
                searchQuery = '';
                searchInput.placeholder = 'Maghanap ng Barangay sa koneksyon (e.g. Agaas)...';

                updateUI();
            });



        }

        // Initialize on load
        window.addEventListener('DOMContentLoaded', initApp);
    </script>
